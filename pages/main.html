<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAC – Portal Colaboradores</title>
  <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="../images/favicon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/colaborador-styles.css">
</head>
<body>

  <div class="shell">

    <!-- ── HEADER ── -->
    <header class="shell-header">
      <div class="header-brand">
        <div class="header-logo">
          <img src="../images/DAC.png" alt="Logo DAC" class="header-logo-image">
        </div>
        <div class="header-text">
          <span class="title">Distribuidora AgroComercial</span>
          <span class="subtitle" id="pageSubtitle">Portal de Colaboradores</span>
        </div>
      </div>
      <button id="sidebarToggle" class="toggle-btn" aria-label="Menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </header>

    <div class="shell-body">

      <!-- ── SIDEBAR ── -->
      <nav class="sidebar" id="sidebar">
        <ul>
          <li>
            <a href="#inicio" data-route="inicio" data-label="Inicio">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
              <span>Inicio</span>
            </a>
          </li>
          <li>
            <a href="#perfil" data-route="perfil" data-label="Mi Perfil">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span>Mi Perfil</span>
            </a>
          </li>
          <li>
            <a href="#medismart" data-route="medismart" data-label="Plan Médico">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <span>Plan Médico</span>
            </a>
          </li>
          <li>
            <a href="#vacaciones" data-route="vacaciones" data-label="Vacaciones">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8"  y1="2" x2="8"  y2="6"/>
                <line x1="3"  y1="10" x2="21" y2="10"/>
              </svg>
              <span>Vacaciones</span>
            </a>
          </li>
          <li id="navNoticiasAdmin" style="display:none">
            <a href="#noticias-admin" data-route="noticias-admin" data-label="Noticias (Admin)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m3 11 18-5v12L3 14v-3z"/>
                <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>
              </svg>
              <span>Noticias (Admin)</span>
            </a>
          </li>
          <li class="sidebar-logout">
            <a href="#" id="btnLogout" data-label="Cerrar sesión">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span>Cerrar sesión</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- ── ÁREA DE CONTENIDO ── -->
      <div class="content-area">
        <div id="pageContent" class="page-content">
          <!-- El fragmento de cada página se inyecta aquí -->
          <div class="page-loading">
            <div class="page-spinner"></div>
          </div>
        </div>
        <footer class="shell-footer">
          Distribuidora AgroComercial &middot; Autogestión de Datos
        </footer>
      </div>

    </div><!-- /.shell-body -->
  </div><!-- /.shell -->

  <script src="../js/sidebar.js"></script>
  <script src="../js/router.js"></script>
</body>
</html>
