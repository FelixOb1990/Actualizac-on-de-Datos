<!-- fragments/inicio.html -->
<div class="frag-inicio">

  <div class="frag-greeting">
    <h1 class="frag-title">Bienvenido, <span id="greetName">colaborador</span></h1>
    <p class="frag-sub">Enterate de las últimas novedades de la empresa.</p>
  </div>

  <div id="noticiasFeed" class="frag-noticias">
    <div class="frag-noticias-empty">Cargando noticias...</div>
  </div>

</div>

<style>
.frag-inicio { max-width: 860px; margin: 0 auto; }
.frag-greeting { margin-bottom: 36px; }
.frag-title { font-family: 'DM Serif Display', serif; font-size: 1.9rem; color: var(--green-dark); font-weight: 400; }
.frag-title span { color: var(--green-mid); }
.frag-sub { margin-top: 6px; color: #5a8a6a; font-size: 0.95rem; }

.frag-noticias { display: flex; flex-direction: column; gap: 16px; }

.frag-noticia-card {
  background: var(--white);
  border: 1px solid var(--green-border);
  border-radius: 14px;
  padding: 22px 24px;
}
.frag-noticia-fecha {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--green-mid);
  margin-bottom: 6px;
}
.frag-noticia-titulo {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--green-dark);
  margin-bottom: 8px;
}
.frag-noticia-img {
  width: 100%;
  max-height: 320px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 12px;
  display: block;
}
.frag-noticia-cuerpo {
  font-size: 0.9rem;
  color: var(--text-dark);
  line-height: 1.55;
  white-space: pre-wrap;
}
.frag-noticia-autor {
  margin-top: 10px;
  font-size: 0.8rem;
  color: #5a8a6a;
  font-style: italic;
}

.frag-noticias-empty {
  text-align: center;
  padding: 40px 20px;
  color: #5a8a6a;
  font-size: 0.9rem;
  background: var(--white);
  border: 1px solid var(--green-border);
  border-radius: 14px;
}
</style>

<script>
(function () {
  // ⚠️ Reemplazar con la URL real del flow de Power Automate para Noticias
  const FLOW_URL_NOTICIAS = 'https://REEMPLAZAR-CON-URL-DEL-FLOW-DE-NOTICIAS';

  const user = JSON.parse(localStorage.getItem('user') || '{}');
  document.getElementById('greetName').textContent = user['Title'] || 'colaborador';

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatFecha(f) {
    if (!f) return '';
    const d = new Date(f);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('es-CR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  async function cargarNoticias() {
    const cont = document.getElementById('noticiasFeed');
    try {
      const res = await fetch(FLOW_URL_NOTICIAS, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ operacion: 'GetNoticias', datos: {} })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const noticias = Array.isArray(data) ? data : (data.value || []);

      if (!noticias.length) {
        cont.innerHTML = '<div class="frag-noticias-empty">No hay noticias por el momento.</div>';
        return;
      }

      const ordenadas = [...noticias].sort((a, b) => new Date(b.FechaPublicacion) - new Date(a.FechaPublicacion));

      cont.innerHTML = ordenadas.map(n => `
        <div class="frag-noticia-card">
          <div class="frag-noticia-fecha">${escHtml(formatFecha(n.FechaPublicacion))}</div>
          <h3 class="frag-noticia-titulo">${escHtml(n.Title)}</h3>
          ${n.ImagenURL ? `<img class="frag-noticia-img" src="${escHtml(n.ImagenURL)}" alt="">` : ''}
          <p class="frag-noticia-cuerpo">${escHtml(n.Contenido)}</p>
          ${n.Autor ? `<div class="frag-noticia-autor">— ${escHtml(n.Autor)}</div>` : ''}
        </div>
      `).join('');
    } catch (e) {
      cont.innerHTML = '<div class="frag-noticias-empty">No se pudieron cargar las noticias.</div>';
    }
  }

  cargarNoticias();
})();
</script>
