<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión – Medismart</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="images/favicon-192.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <header>
    <div class="header-brand">
      <!-- Logo a la izquierda -->
      <div class="header-logo">
        <img src="images/DAC-icon.png" alt="Logo DAC" class="header-logo-image">
      </div>
      <!-- Texto después del logo -->
      <div class="header-text">
        <span class="title">Distribuidora AgroComercial</span>
        <span class="subtitle">Colaboradores</span>
      </div>
    </div>
  </header>
  <main>
    <div class="card">

      <div class="card-header">
        <div class="card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h1>Iniciar sesión</h1>
        <p>Ingrese su n&uacute;mero de c&eacute;dula y contraseña</p>
      </div>

      <div class="card-body">

        <div class="field">
          <label for="username">Cédula</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="#2e7d46" stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" name="username"
                   placeholder="N&uacute;mero de c&eacute;dula" required autocomplete="username">
          </div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="#2e7d46" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password"
                   placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="button" class="btn-submit" id="Btn_buscar" onclick="buscarColaborador()">Ingresar</button>

        <div class="forgot">
          <a href="#">¿Olvidó su contraseña?</a>
        </div>
  <div class="loading" id="loadingState"><div class="spinner"></div><p>Verificando credenciales...</p></div>
  <div class="alert" id="alertGlobal"></div>
      </div>
    </div>
  </main>
  <footer>
    Distribuidora AgroComercial &middot; Autogesti&oacute; de Datos
  </footer>
  <script src="js/shared.js"></script>
  <script src="js/login-app.js"></script>
</body>
</html>
